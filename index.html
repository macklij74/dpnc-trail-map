<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trail Map</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>
    <script>
        let map;
        let userMarker;
        let trails = []; // Array to hold trail coordinates

        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: {lat: 0, lng: 0},
                zoom: 2
            });

            // Setup geolocation tracking
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(showPosition);
            }
        }

        function showPosition(position) {
            const userLocation = {
                lat: position.coords.latitude,
                lng: position.coords.longitude
            };

            // Update user marker
            if (userMarker) {
                userMarker.setPosition(userLocation);
            } else {
                userMarker = new google.maps.Marker({
                    position: userLocation,
                    map: map,
                    title: 'Your location'
                });
                map.setCenter(userLocation);
            }

            // Calculate and display distances to trails
            trails.forEach(trail => {
                const trailLocation = new google.maps.LatLng(trail.lat, trail.lng);
                const distance = google.maps.geometry.spherical.computeDistanceBetween(
                    new google.maps.LatLng(userLocation.lat, userLocation.lng),
                    trailLocation
                );
                console.log(`Distance to ${trail.name}: ${distance} meters`);
            });
        }

        // Function to add trail to the map
        function addTrail(name, lat, lng) {
            trails.push({name, lat, lng});
            const trailMarker = new google.maps.Marker({
                position: {lat, lng},
                map: map,
                title: name
            });
        }

        window.onload = initMap;
    </script>
</head>
<body>
    <h1>Trail Map</h1>
    <div id="map" style="height: 500px; width: 100%;"></div>
</body>
</html>
