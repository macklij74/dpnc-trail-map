  <script>
    // ========== TRAIL DATA ==========
    const TRAILS = [
      {
        id: 1, emoji: "🌳", name: "Forest Loop",
        location: "DPNC", difficulty: "easy", distance: "0.9", time: "30", elevation: "Gentle",
        lat: 41.3655, lng: -71.9845,  // ← ADD GPS COORDINATES HERE
        tags: ["Family-friendly", "Loop", "Marsh & pond", "Oak & hickory woods"],
        desc: "...",
        wildlife: [...],
        tips: [...]
      },
      // ... repeat for all 10 trails with lat/lng added
    ];

    const WILDLIFE_ALL = [ /* same as before */ ];

    // ========== GPS STATE VARIABLES ==========
    let currentFilter = 'all';
    let userLocation = null;        // ← NEW
    let gpsEnabled = false;         // ← NEW
    let gpsWatchId = null;          // ← NEW

    // ========== GPS FUNCTIONS ==========
    function toggleGPS() {
      if (!gpsEnabled) {
        startGPS();
      } else {
        stopGPS();
      }
    }

    function startGPS() {
      const btn = document.getElementById('gps-btn');
      if (navigator.geolocation) {
        gpsWatchId = navigator.geolocation.watchPosition(
          position => {
            userLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude,
              accuracy: position.coords.accuracy
            };
            gpsEnabled = true;
            btn.classList.add('active');
            updateLocationInfo();
            renderTrails();
          },
          error => {
            console.error('Geolocation error:', error);
            alert('Unable to access location. Please check permissions.');
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      } else {
        alert('Geolocation is not supported by this browser.');
      }
    }

    function stopGPS() {
      if (gpsWatchId !== null) {
        navigator.geolocation.clearWatch(gpsWatchId);
        gpsWatchId = null;
      }
      gpsEnabled = false;
      userLocation = null;
      document.getElementById('gps-btn').classList.remove('active');
      document.getElementById('location-info').style.display = 'none';
      renderTrails();
    }

    function updateLocationInfo() {
      const info = document.getElementById('location-info');
      const coords = document.getElementById('location-coords');
      const accuracy = document.getElementById('location-accuracy');
      
      if (userLocation) {
        coords.textContent = userLocation.lat.toFixed(4) + ', ' + userLocation.lng.toFixed(4);
        accuracy.textContent = 'Accuracy: ±' + Math.round(userLocation.accuracy) + 'm';
        info.style.display = 'block';
      }
    }

    // ========== HAVERSINE DISTANCE CALCULATION ==========
    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 3959; // Earth's radius in miles
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    // ========== MODIFY renderTrails FUNCTION ==========
    function renderTrails() {
      const list = document.getElementById('trails-list');
      let filtered = TRAILS;
      if (currentFilter === 'dpnc') filtered = TRAILS.filter(t => t.location === 'DPNC' || t.location === 'Both');
      else if (currentFilter === 'coogan') filtered = TRAILS.filter(t => t.location === 'Coogan Farm' || t.location === 'Both');
      else if (currentFilter === 'easy') filtered = TRAILS.filter(t => t.difficulty === 'easy');
      else if (currentFilter === 'moderate') filtered = TRAILS.filter(t => t.difficulty === 'moderate');
      else if (currentFilter === 'short') filtered = TRAILS.filter(t => parseFloat(t.distance) < 0.5);
      else if (currentFilter === 'family') filtered = TRAILS.filter(t => t.tags.some(tg => tg.toLowerCase().includes('family')));

      list.innerHTML = filtered.map(t => {
        let distanceHTML = '';
        if (gpsEnabled && userLocation) {
          const dist = calculateDistance(userLocation.lat, userLocation.lng, t.lat, t.lng);
          distanceHTML = `<div class="trail-distance">📍 ${dist.toFixed(1)} mi away</div>`;
        }
        return `
        <div class="trail-card" onclick="openDetail(${t.id})">
          <div class="trail-card-header">
            <div class="trail-emoji">${t.emoji}</div>
            <div class="trail-info">
              <div class="trail-name">${t.name}</div>
              <div class="trail-meta">${t.distance} mi · ${t.time} min · ${t.elevation} · <span style="color:var(--forest);font-weight:800;">${t.location}</span></div>
              ${distanceHTML}
            </div>
            <div class="difficulty-badge diff-${t.difficulty}">${t.difficulty}</div>
          </div>
          <div class="trail-tags">${t.tags.map(tg => `<span class="tag">${tg}</span>`).join('')}</div>
          <div class="trail-stats-row">
            <div class="trail-stat"><div class="ts-num">${t.distance}mi</div><div class="ts-lbl">Distance</div></div>
            <div class="trail-stat"><div class="ts-num">${t.time}m</div><div class="ts-lbl">Est. Time</div></div>
            <div class="trail-stat"><div class="ts-num">${t.wildlife.length}</div><div class="ts-lbl">Species</div></div>
          </div>
        </div>
      `;
      }).join('');
    }

    // ========== KEEP ALL OTHER EXISTING FUNCTIONS ==========
    function filterTrails(f, btn) { /* same as before */ }
    function openDetail(id) { /* same as before */ }
    function closeDetail() { /* same as before */ }
    function renderWildlife() { /* same as before */ }
    function showPage(name, btn) { /* same as before */ }
    
    // ========== PWA & INIT ==========
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => { /* same as before */ });
    // ... rest of initialization

  </script>
</body>
