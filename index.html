<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DPNC Trail Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="" crossorigin=""></script>

  <style>
    html,body{height:100%;margin:0}
    body{display:flex;flex-direction:column;font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial}
    header{background:#0b5; padding:8px 12px; color:#022; display:flex;align-items:center;gap:12px}
    header h1{font-size:1rem;margin:0}
    main{flex:1; display:flex; min-height:0}
    #sidebar{width:300px;background:#f7f7f7;border-right:1px solid #ddd;padding:10px;box-sizing:border-box;overflow:auto}
    #map{flex:1;min-height:0}
    .control-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
    #gps-btn{padding:6px 10px;border-radius:6px;border:1px solid #888;background:#fff;cursor:pointer}
    #gps-btn.active{background:#0b5;color:#fff;border-color:#096}
    #location-info{font-size:0.9rem;margin-top:6px;color:#333;display:none}
    .trail-list{list-style:none;padding:0;margin:0}
    .trail-list li{padding:6px;border-bottom:1px solid #eee}
    .small{font-size:0.85rem;color:#555}
    /* Make map visible below header */
    #map{height:100%}
  </style>
</head>
<body>
  <header>
    <h1>DPNC Trail Map</h1>
    <div class="small">Trail map with GPS</div>
  </header>

  <main>
    <aside id="sidebar">
      <div class="control-row">
        <button id="gps-btn" title="Toggle GPS">Enable GPS</button>
        <button id="center-btn" title="Center on user" disabled>Center</button>
      </div>
      <div id="location-info" aria-live="polite"></div>

      <hr>

      <div>
        <strong>Trails</strong>
        <ul id="trails" class="trail-list">
          <li>Loading trails…</li>
        </ul>
      </div>

      <hr>

      <div>
        <strong>Notes</strong>
        <p class="small">If you have a trails.geojson file in the site root it will be loaded automatically. Otherwise the map shows a sample trail.</p>
      </div>
    </aside>

    <div id="map"></div>
  </main>

  <script>
    // Basic map setup
    const map = L.map('map', {zoomControl:true}).setView([38.851,-77.285], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Layer groups
    const trailsLayer = L.geoJSON(null, {
      style: {color:'#2a8', weight:4}
    }).addTo(map);

    // Try to load trails.geojson from repo root (replace path if needed)
    fetch('trails.geojson').then(r=>{
      if(!r.ok) throw new Error('No trails.geojson');
      return r.json();
    }).then(geojson=>{
      trailsLayer.addData(geojson);
      populateTrailList(geojson);
      map.fitBounds(trailsLayer.getBounds(), {padding:[20,20]});
    }).catch(()=> {
      // fallback sample trail if none available
      const sample = {
        "type":"FeatureCollection",
        "features":[
          {"type":"Feature","properties":{"name":"Sample Trail"},"geometry":{"type":"LineString","coordinates":[[-77.34,38.86],[-77.31,38.855],[-77.285,38.86],[-77.27,38.845]]}}
        ]
      };
      trailsLayer.addData(sample);
      populateTrailList(sample);
      map.fitBounds(trailsLayer.getBounds(), {padding:[20,20]});
    });

    function populateTrailList(geojson){
      const ul = document.getElementById('trails');
      ul.innerHTML = '';
      geojson.features.forEach((f,i)=>{
        const li = document.createElement('li');
        const name = f.properties && (f.properties.name || f.properties.title) || `Trail ${i+1}`;
        li.textContent = name;
        li.style.cursor = 'pointer';
        li.addEventListener('click', ()=>{
          const layer = L.geoJSON(f);
          map.fitBounds(layer.getBounds(), {padding:[20,20]});
        });
        ul.appendChild(li);
      });
    }

    // --- GPS functionality ---
    // State variables
    let watchId = null;
    let userMarker = null;
    let userCircle = null;
    let follow = false; // when true, map centers on updates
    const gpsBtn = document.getElementById('gps-btn');
    const centerBtn = document.getElementById('center-btn');
    const info = document.getElementById('location-info');

    // Initialize UI
    gpsBtn.addEventListener('click', toggleGPS);
    centerBtn.addEventListener('click', centerOnUser);

    // Improved toggleGPS: starts/stops watchPosition and updates UI
    function toggleGPS(){
      if(!navigator.geolocation){
        showInfo('Geolocation not supported on this device.');
        return;
      }

      // If already watching, stop
      if(watchId !== null){
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
        gpsBtn.classList.remove('active');
        gpsBtn.textContent = 'Enable GPS';
        centerBtn.disabled = true;
        follow = false;
        showInfo('GPS disabled.');
        return;
      }

      // Start watching
      showInfo('Locating…');
      gpsBtn.textContent = 'Locating…';
      // Try to get a quick current position first, then start watch for continuous tracking
      navigator.geolocation.getCurrentPosition(pos=>{
        handlePosition(pos, {initial:true});
        // now start watch for continuous updates
        startWatch();
      }, err=>{
        // if immediate getCurrentPosition fails (timeout/permission), show message but still attempt watch
        if(err.code === err.PERMISSION_DENIED){
          showInfo('Location request denied.');
          gpsBtn.classList.remove('active');
          gpsBtn.textContent = 'Enable GPS';
          return;
        }
        // start watch anyway (some browsers will request permission on watch)
        startWatch();
      }, {enableHighAccuracy:true,timeout:10000,maximumAge:30000});
    }

    function startWatch(){
      if(!navigator.geolocation) return;
      // Ensure any previous watch cleared
      if(watchId !== null) navigator.geolocation.clearWatch(watchId);

      watchId = navigator.geolocation.watchPosition(position=>{
        handlePosition(position);
      }, error=>{
        let msg = 'Unable to get location: ' + (error.message || error.code);
        if(error.code === 1) msg = 'Location request denied.';
        showInfo(msg);
        // keep watchId so user can stop; remove active state on permission error
        if(error.code === 1){
          gpsBtn.classList.remove('active');
          gpsBtn.textContent = 'Enable GPS';
          centerBtn.disabled = true;
          navigator.geolocation.clearWatch(watchId);
          watchId = null;
        }
      }, {enableHighAccuracy:true,timeout:15000,maximumAge:5000});
    }

    function handlePosition(position, opts){
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      const acc = Math.round(position.coords.accuracy || 0);
      const ll = [lat,lng];

      // create or update marker / circle
      if(!userMarker){
        userMarker = L.marker(ll, {icon: L.circleMarker(ll, {radius:6})});
        userMarker.addTo(map);
      } else {
        userMarker.setLatLng(ll);
      }

      if(!userCircle){
        userCircle = L.circle(ll, {radius: position.coords.accuracy || 20, color:'#06f', weight:1, fillColor:'#06f', fillOpacity:0.1});
        userCircle.addTo(map);
      } else {
        userCircle.setLatLng(ll);
        userCircle.setRadius(position.coords.accuracy || 20);
      }

      // update UI & button states
      gpsBtn.classList.add('active');
      gpsBtn.textContent = 'Disable GPS';
      centerBtn.disabled = false;
      showInfo(`📍 Your location:\n${lat.toFixed(6)}, ${lng.toFixed(6)}\nAccuracy: ±${acc} meters`);

      // If this was an initial fix, set follow = true so subsequent updates keep centering
      if(opts && opts.initial){
        follow = true;
        map.setView(ll, 16);
      } else if(follow){
        map.panTo(ll);
      }
    }

    function centerOnUser(){
      if(!userMarker) return;
      const latlng = userMarker.getLatLng();
      map.setView(latlng, Math.max(map.getZoom(),15));
      // If user manually centers, keep follow = true so subsequent updates continue centering.
      follow = true;
    }

    function showInfo(text){
      if(!info) return;
      info.style.display = 'block';
      // Preserve line breaks
      info.innerHTML = text.toString().replace(/\n/g,'<br>');
    }

    // Optional: when switching pages or loading, hide the info area
    (function initUi(){
      info.style.display = 'none';
      gpsBtn.textContent = 'Enable GPS';
    })();

    // If you prefer a toggle that only gets current position (no continuous watch),
    // replace startWatch() with a single getCurrentPosition call and do not set watchId.

  </script>

</body>
</html>
