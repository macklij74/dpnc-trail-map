</main> <script> // Basic map setup const map = L.map('map', {zoomControl:true}).setView([38.851,-77.285], 12); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap contributors' }).addTo(map); // Helper: compute UI offsets (header + sidebar) and return fitBounds padding function getUIOffsets() { const header = document.querySelector('header'); const sidebar = document.getElementById('sidebar'); const headerHeight = header ? Math.round(header.getBoundingClientRect().height) : 0; const sidebarWidth = sidebar ? Math.round(sidebar.getBoundingClientRect().width) : 0; return { headerHeight, sidebarWidth }; } function getFitPadding(extra = 10) { const { headerHeight, sidebarWidth } = getUIOffsets(); // Leaflet fitBounds supports paddingTopLeft/paddingBottomRight return { paddingTopLeft: [sidebarWidth + extra, headerHeight + extra], paddingBottomRight: [extra, extra] }; } // Ensure Leaflet recalculates size after layout changes function ensureMapSize() { // small timeout to allow layout to settle setTimeout(() => map.invalidateSize(), 100); } // Debounced resize handler let resizeTimer = null; window.addEventListener('resize', () => { if (resizeTimer) clearTimeout(resizeTimer); resizeTimer = setTimeout(() => { ensureMapSize(); resizeTimer = null; }, 150); }); // call when map is ready map.whenReady(() => { ensureMapSize(); }); // Layer groups const trailsLayer = L.geoJSON(null, { style: {color:'#2a8', weight:4} }).addTo(map); // Try to load trails.geojson from repo root (replace path if needed) fetch('trails.geojson').then(r=>{ if(!r.ok) throw new Error('No trails.geojson'); return r.json(); }).then(geojson=>{ trailsLayer.addData(geojson); populateTrailList(geojson); ensureMapSize(); map.fitBounds(trailsLayer.getBounds(), getFitPadding()); }).catch(()=> { // fallback sample trail if none available const sample = { "type":"FeatureCollection", "features":[ {"type":"Feature","properties":{"name":"Sample Trail"},"geometry":{"type":"LineString","coordinates":[[-77.34,38.86],[-77.31,38.855],[-77.285,38.86],[-77.27,38.845]]}} ] }; trailsLayer.addData(sample); populateTrailList(sample); ensureMapSize(); map.fitBounds(trailsLayer.getBounds(), getFitPadding()); }); function populateTrailList(geojson){ const ul = document.getElementById('trails'); ul.innerHTML = ''; geojson.features.forEach((f,i)=>{ const li = document.createElement('li'); const name = f.properties && (f.properties.name || f.properties.title) || `Trail ${i+1}`; li.textContent = name; li.style.cursor = 'pointer'; li.addEventListener('click', ()=>{ const layer = L.geoJSON(f); // fit bounds using UI padding so the trail is not hidden under sidebar/header map.fitBounds(layer.getBounds(), getFitPadding()); }); ul.appendChild(li); }); } // --- GPS functionality --- // State variables let watchId = null; let userMarker = null; let userCircle = null; let follow = false; // when true, map centers on updates const gpsBtn = document.getElementById('gps-btn'); const centerBtn = document.getElementById('center-btn'); const info = document.getElementById('location-info'); // Initialize UI gpsBtn.addEventListener('click', toggleGPS); centerBtn.addEventListener('click', centerOnUser); // Improved toggleGPS: starts/stops watchPosition and updates UI function toggleGPS(){ if(!navigator.geolocation){ showInfo('Geolocation not supported on this device.'); return; } // If already watching, stop if(watchId !== null){ navigator.geolocation.clearWatch(watchId); watchId = null; gpsBtn.classList.remove('active'); gpsBtn.textContent = 'Enable GPS'; centerBtn.disabled = true; follow = false; showInfo('GPS disabled.'); return; } // Start watching showInfo('Locating…'); gpsBtn.textContent = 'Locating…'; // Try to get a quick current position first, then start watch for continuous tracking navigator.geolocation.getCurrentPosition(pos=>{ handlePosition(pos, {initial:true}); // now start watch for continuous updates startWatch(); }, err=>{ // if immediate getCurrentPosition fails (timeout/permission), show message but still attempt watch if(err.code === err.PERMISSION_DENIED){ showInfo('Location request denied.'); gpsBtn.classList.remove('active'); gpsBtn.textContent = 'Enable GPS'; return; } // start watch anyway (some browsers will request permission on watch) startWatch(); }, {enableHighAccuracy:true,timeout:10000,maximumAge:30000}); } function startWatch(){ if(!navigator.geolocation) return; // Ensure any previous watch cleared if(watchId !== null) navigator.geolocation.clearWatch(watchId); watchId = navigator.geolocation.watchPosition(position=>{ handlePosition(position); }, error=>{ let msg = 'Unable to get location: ' + (error.message || error.code); if(error.code === 1) msg = 'Location request denied.'; showInfo(msg); // handle permission error by clearing watch and updating UI if(error.code === 1){ gpsBtn.classList.remove('active'); gpsBtn.textContent = 'Enable GPS'; centerBtn.disabled = true; navigator.geolocation.clearWatch(watchId); watchId = null; } }, {enableHighAccuracy:true,timeout:15000,maximumAge:5000}); } function handlePosition(position, opts){ const lat = position.coords.latitude; const lng = position.coords.longitude; const acc = Math.round(position.coords.accuracy || 0); const ll = [lat,lng]; // create or update marker / circle if(!userMarker){ userMarker = L.marker(ll, {icon: L.circleMarker(ll, {radius:6})}); userMarker.addTo(map); } else { userMarker.setLatLng(ll); } if(!userCircle){ userCircle = L.circle(ll, {radius: position.coords.accuracy || 20, color:'#06f', weight:1, fillColor:'#06f', fillOpacity:0.1}); userCircle.addTo(map); } else { userCircle.setLatLng(ll); userCircle.setRadius(position.coords.accuracy || 20); } // update UI & button states gpsBtn.classList.add('active'); gpsBtn.textContent = 'Disable GPS'; centerBtn.disabled = false; showInfo(`📍 Your location:\n${lat.toFixed(6)}, ${lng.toFixed(6)}\nAccuracy: ±${acc} meters`); // If this was an initial fix, set follow = true so subsequent updates keep centering if(opts && opts.initial){ follow = true; // center using offset so marker is not hidden under the sidebar/header centerOnUserWithOffset(ll, 16); } else if(follow){ // pan while maintaining offset centerOnUserWithOffset(ll); } } // Center on user but account for header/sidebar by offsetting container point function centerOnUserWithOffset(latlng, zoom) { // latlng may be [lat, lng] array or a LatLng object const latLngObj = Array.isArray(latlng) ? L.latLng(latlng[0], latlng[1]) : latlng; const { headerHeight, sidebarWidth } = getUIOffsets(); // container point of the location const containerPt = map.latLngToContainerPoint(latLngObj); // compute target container point shifted so the point appears centered within the visible map area // shift X by half the sidebar width to the right (so marker sits in visual center of map area) // shift Y up by half the header height so marker is lower (visible) if header overlays top const targetPt = L.point( containerPt.x + Math.round(sidebarWidth / 2), containerPt.y - Math.round(headerHeight / 2) ); const targetLatLng = map.containerPointToLatLng(targetPt); if (typeof zoom === 'number') { map.setView(targetLatLng, zoom); } else { map.panTo(targetLatLng); } } function centerOnUser(){ if(!userMarker) return; const latlng = userMarker.getLatLng(); centerOnUserWithOffset(latlng, Math.max(map.getZoom(),15)); follow = true; } function showInfo(text){ if(!info) return; info.style.display = 'block'; // Preserve line breaks info.innerHTML = text.toString().replace(/\n/g,'<br>'); } // Optional: when switching pages or loading, hide the info area (function initUi(){ info.style.display = 'none'; gpsBtn.textContent = 'Enable GPS'; ensureMapSize(); })(); // If you prefer a toggle that only gets current position (no continuous watch), // replace startWatch() with a single getCurrentPosition call and do not set watchId. </script> </body> </html>
